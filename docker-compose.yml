services:
  air:
    image: cosmtrek/air
    working_dir: /www/air
    ports:
      - "${APP_PORT_AIR}:${APP_PORT_AIR}"
    env_file:
      - .env
    environment:
      - "APP_HOST=0.0.0.0"
      - "APP_PORT=${APP_PORT_AIR}"
      - "AUTH_HOST=auth-air"
      - "AUTH_PORT=${AUTH_PORT_AIR}"
      - "DB_HOST=db"
      - "DB_PORT=5432"
      - "REDIS_ADDR=cache:6379"
      - "KAFKA_ADDR=kafka:9092"
    volumes:
      - .:/www/air
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    profiles:
      - dev
  auth-air:
    image: cosmtrek/air
    working_dir: /www/air/auth-microservice
    ports:
      - "${AUTH_PORT_AIR}:${AUTH_PORT_AIR}"
    env_file:
      - .env
    environment:
      - "APP_PORT=${AUTH_PORT_AIR}"
      - "DB_HOST=db"
      - "DB_PORT=5432"
      - "REDIS_ADDR=cache:6379"
      - "KAFKA_ADDR=kafka:9092"
    volumes:
      - .:/www/air
      - auth_go_mod_cache:/go/pkg/mod
      - auth_go_build_cache:/root/.cache/go-build
    profiles:
      - dev
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT}:${APP_PORT}"
    env_file:
      - .env
    environment:
      - "APP_HOST=0.0.0.0"
      - "DB_HOST=db"
      - "DB_PORT=5432"
      - "REDIS_ADDR=cache:6379"
      - "KAFKA_ADDR=kafka:9092"
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - prod
  db:
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DOCKER_EXPOSED_DB_PORT}:5432"
    volumes:
      - ~/.docker-volumes/go-with-tools/pgdata:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE} -h localhost" ]
      interval: 2s
      timeout: 3s
      retries: 30
  cache:
    image: redis:latest
    restart: unless-stopped
    ports:
      - "${DOCKER_EXPOSED_REDIS_PORT}:6379"
    volumes:
      - cache_volume:/data
  migrate:
    image: golang:1.25-alpine
    working_dir: /www/app
    env_file:
      - .env
    environment:
      - "GOOSE_DBSTRING=postgres://${DB_USERNAME}:${DB_PASSWORD}@db:5432/${DB_DATABASE}"
    volumes:
      - .:/www/app
      - migrate_go_mod_cache:/go/pkg/mod
      - migrate_go_build_cache:/root/.cache/go-build
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "go install github.com/pressly/goose/v3/cmd/goose@latest && goose up"
    profiles:
      - tools
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "9092:9092"
volumes:
  cache_volume:
  go_mod_cache:
  go_build_cache:
  auth_go_mod_cache:
  auth_go_build_cache:
  migrate_go_mod_cache:
  migrate_go_build_cache:
  kafka_data: